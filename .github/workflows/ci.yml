name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-media-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: SebasCarvajal11/crm-infra/.github/workflows/reusable-ci.yml@v2.1.0
    with:
      component: media
      test_command: pnpm test:unit
    secrets: inherit

  oci-verify:
    runs-on: ubuntu-latest
    env:
      OCI_CONFIG_FILE_CONTENT: ${{ secrets.OCI_CONFIG_FILE_CONTENT }}
      OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
      OCI_BUCKET_AVATARS_PUBLIC: ${{ secrets.OCI_BUCKET_AVATARS_PUBLIC }}
      OCI_BUCKET_DOCS_PRIVATE: ${{ secrets.OCI_BUCKET_DOCS_PRIVATE }}

    steps:
      - name: Check OCI secret readiness
        id: guard
        shell: bash
        run: |
          missing=0
          for key in OCI_CONFIG_FILE_CONTENT OCI_PRIVATE_KEY_PEM OCI_REGION OCI_NAMESPACE OCI_BUCKET_AVATARS_PUBLIC OCI_BUCKET_DOCS_PRIVATE; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Write OCI config
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/oci"
          printf '%s\n' "${OCI_PRIVATE_KEY_PEM}" > "$RUNNER_TEMP/oci/oci_api_key.pem"
          printf '%s\n' "${OCI_CONFIG_FILE_CONTENT}" | sed "s|^key_file=.*$|key_file=$RUNNER_TEMP/oci/oci_api_key.pem|" > "$RUNNER_TEMP/oci/oci.config"

      - name: Verify OCI access
        if: ${{ steps.guard.outputs.enabled == 'true' }}
        env:
          DATABASE_URL: postgres://unused:unused@127.0.0.1:5432/unused
          DB_SCHEMA: schema_media
          PORT: "3002"
          NODE_ENV: test
          TRUST_GATEWAY_JWT_HEADERS: "true"
          OCI_CONFIG_FILE_PATH: ${{ runner.temp }}/oci/oci.config
          OCI_CONFIG_PROFILE: DEFAULT
          CLAMAV_HOST: 127.0.0.1
          CLAMAV_PORT: "3310"
          CLAMAV_SCAN_TIMEOUT_MS: "90000"
          DOC_PAR_TTL_SECONDS: "300"
          OCI_PAR_PRUNE_MAX: "80"
          AVATAR_VERSIONS_TO_KEEP: "3"
          MOD_COLLAB_URL: http://127.0.0.1:3001
        run: pnpm oci:verify

      - name: OCI verify skipped
        if: ${{ steps.guard.outputs.enabled != 'true' }}
        run: echo "OCI verification skipped because required production secrets are not configured for this repository."
